<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bae's Birthday Farm on Sunshine Island 🐔</title>
<style>
  :root{
    --grass-dark:#3f7d34;
    --grass-light:#7fb069;
    --wood:#8b5a2b;
    --wood-dark:#5c3a1a;
    --cream:#fdf6e3;
    --gold:#f2b134;
    --accent:#c1440e;
    --shadow: 0 6px 14px rgba(0,0,0,.35);
    font-family: "Segoe UI Rounded","SF Pro Rounded","Trebuchet MS",Verdana,sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    padding:28px 12px 60px;
    background:radial-gradient(circle at 50% 0%, #bfe7ff 0%, #6fb7e6 55%, #3a8fc2 100%);
    color:var(--wood-dark);
  }

  /* ---- Banner ---- */
  .banner{
    background:var(--cream);
    border:6px solid var(--wood);
    border-radius:26px;
    padding:14px 34px;
    font-size:clamp(1.3rem, 3vw, 2.1rem);
    font-weight:800;
    text-align:center;
    box-shadow:var(--shadow);
    transform:rotate(-1deg);
  }
  .subtitle{
    margin:-6px 0 0;
    font-size:.95rem;
    text-align:center;
    color:#1f3d1a;
    background:rgba(255,255,255,.75);
    padding:6px 16px;
    border-radius:14px;
  }

  /* ---- Island stage ---- */
  .island-stage{
    position:relative;
    width:min(1024px, 96vw);
    aspect-ratio:1024/576;
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
    border:6px solid var(--wood);
    background:#2f6b2a;
  }
  .island-stage img.bg{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    user-select:none;
    pointer-events:none;
  }

  /* Uyen: als besonderes Bild fest in der Mitte der Karte platziert (um ein Drittel vergrößert) */
  .center-figure{
    position:absolute;
    left:50%;
    top:52%;
    height:50.7%;
    width:auto;
    transform:translate(-50%,-50%);
    filter:drop-shadow(0 8px 6px rgba(0,0,0,.4));
    user-select:none;
    pointer-events:none;
    z-index:2;
  }

  /* ---- Pins ---- */
  .pin{
    position:absolute;
    transform:translate(-50%,-50%);
    width:9.5%;
    aspect-ratio:1/1;
    min-width:40px;
    border:none;
    background:none;
    cursor:pointer;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:500px;
    transition:transform .15s ease, filter .15s ease;
  }
  /* Kontaktschatten, damit das Huhn auf dem Boden zu stehen scheint statt zu schweben */
  .pin::before{
    content:"";
    position:absolute;
    bottom:6%;
    width:72%;
    height:22%;
    background:radial-gradient(ellipse at center, rgba(10,25,5,.5) 0%, rgba(10,25,5,0) 72%);
    border-radius:50%;
    z-index:0;
  }
  .pin img,
  .pin .name-tag{
    position:relative;
    z-index:1;
  }
  .pin:hover{
    transform:translate(-50%,-50%) scale(1.18);
    filter:drop-shadow(0 0 8px rgba(255,225,140,.95));
    z-index:5;
  }
  .pin.revealed{
    animation:pop .4s ease;
  }
  @keyframes pop{
    0%{ transform:translate(-50%,-50%) scale(.6) rotate(0deg); }
    60%{ transform:translate(-50%,-50%) scale(1.25) rotate(8deg); }
    100%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  }
  .pin img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    filter:drop-shadow(0 3px 2px rgba(0,0,0,.35));
    backface-visibility:hidden;
  }
  .pin.pixel img{
    image-rendering:pixelated;
  }
  /* Dreh-Animation beim Anklicken: Huhn dreht sich einmal um die eigene Achse */
  .pin img.spin{
    animation:spin .7s cubic-bezier(.4,.1,.2,1);
  }
  @keyframes spin{
    0%   { transform:rotateY(0deg); }
    100% { transform:rotateY(360deg); }
  }
  .pin .name-tag{
    position:absolute;
    bottom:-1.6em;
    left:50%;
    transform:translateX(-50%);
    font-size:.65rem;
    background:var(--wood-dark);
    color:var(--cream);
    padding:1px 6px;
    border-radius:8px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }
  .pin.revealed .name-tag{ opacity:1; }

  /* Doggo: eigenständiger Bonus-Pin, immer sichtbar, kein Dreh-Reveal – nur ein Wackler beim Klick */
  .pin.doggo .name-tag{ opacity:1; }
  .pin.doggo.wag{ animation:wag .5s ease; }
  @keyframes wag{
    0%,100%{ transform:translate(-50%,-50%) rotate(0deg); }
    25%{ transform:translate(-50%,-50%) rotate(-12deg); }
    75%{ transform:translate(-50%,-50%) rotate(12deg); }
  }

  /* ---- Reset button ---- */
  .reset-btn{
    border:none;
    background:var(--wood);
    color:var(--cream);
    font-weight:700;
    padding:10px 20px;
    border-radius:16px;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  .reset-btn:hover{ background:var(--wood-dark); }

  /* ---- Modal ---- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(20,30,15,.65);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:var(--cream);
    border:6px solid var(--wood);
    border-radius:24px;
    max-width:360px;
    width:100%;
    padding:22px 22px 26px;
    text-align:center;
    position:relative;
    box-shadow:0 12px 30px rgba(0,0,0,.5);
    animation:pop .35s ease;
  }
  .modal-close{
    position:absolute;
    top:10px;
    right:14px;
    border:none;
    background:none;
    font-size:1.3rem;
    cursor:pointer;
    color:var(--wood-dark);
  }
  .modal img{
    width:150px;
    height:150px;
    object-fit:contain;
    background:#eaf6ff;
    border:4px solid var(--gold);
    border-radius:50%;
    padding:10px;
    margin-bottom:10px;
  }
  .modal h2{ margin:.2em 0; font-size:1.3rem; }
  .modal p{ margin:.4em 0 1em; line-height:1.4; }
  .audio-row{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .audio-row button{
    border:none;
    background:var(--gold);
    color:var(--wood-dark);
    font-weight:700;
    padding:8px 18px;
    border-radius:14px;
    cursor:pointer;
  }
  .audio-row button:disabled{
    background:#ddd;
    color:#888;
    cursor:not-allowed;
  }
  .no-audio-note{ font-size:.8rem; color:#7a6a55; }
</style>
</head>
<body>

  <audio id="bgMusic" src="Sounds/background.mp3" loop></audio>

  <div class="banner">🎉 HAPPY BIRTHDAY BAE! 🎉</div>
  <p class="subtitle">Klick auf ein Huhn auf deiner Sunshine Island! 🐔</p>

  <div class="island-stage" id="islandStage">
    <img class="bg" src="Sunshine Island Set/bfs3.png" alt="Sunshine Island Hintergrund">
    <img class="center-figure" src="Gesichter/Uyen.png" alt="Uyen">
    <!-- Pins werden per JS eingefügt -->
  </div>

  <button class="reset-btn" id="resetBtn">🔄 Karte zurücksetzen</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <img id="modalImage" src="" alt="">
    <h2 id="modalName"></h2>
    <div class="audio-row">
      <audio id="modalAudio"></audio>
      <button id="playBtn">🔊 Nochmal abspielen</button>
      <span class="no-audio-note" id="noAudioNote" hidden>🔇 Audio folgt</span>
    </div>
  </div>
</div>

<script>
  const chickens = [
    "Chickens/White_Chicken.png",
    "Chickens/Blue_Chicken.png",
    "Chickens/Brown_Chicken.png",
    "Chickens/Void_Chicken.png"
  ];

  // links (%), top (%) über dem Hintergrundbild
  const positions = [
    [10,80],[16,45],[22,68],[24,15],[30,30],[36,75],[34,42],[50,16],
    [60,72],[62,40],[66,80],[70,58],[76,30],[84,66],[90,45],[94,68]
  ];

  // Alle 16 Personen der Feier – jede hat ein eigenes Gesicht-im-Hühnerkostüm-Bild.
  const guests = [
    { name:"Ade",      audio:"Sounds/Ade.ogg",      chickenFace:"Chickens_mit_Gesicht/Ade.png" },
    { name:"Basty",    audio:"Sounds/Basty.ogg",    chickenFace:"Chickens_mit_Gesicht/Basty.png" },
    { name:"Bi",       audio:"Sounds/Bi.mp4",       chickenFace:"Chickens_mit_Gesicht/Bi.png" },
    { name:"Bibi",     audio:"Sounds/Bibi.ogg",     chickenFace:"Chickens_mit_Gesicht/Bibi.png" },
    { name:"Emme",     audio:"Sounds/Emme.ogg",     chickenFace:"Chickens_mit_Gesicht/Emme.png" },
    { name:"Fabi",     audio:"Sounds/Fabi.ogg",     chickenFace:"Chickens_mit_Gesicht/Fabi.png" },
    { name:"Flave",    audio:"Sounds/Flave.ogg",    chickenFace:"Chickens_mit_Gesicht/Flave.png" },
    { name:"Ina",      audio:"Sounds/Ina.ogg",      chickenFace:"Chickens_mit_Gesicht/Ina.png" },
    { name:"Jim",      audio:"Sounds/Jim.ogg",      chickenFace:"Chickens_mit_Gesicht/Jim.png" },
    { name:"Jule",     audio:"Sounds/Jule.ogg",     chickenFace:"Chickens_mit_Gesicht/Jule.png" },
    { name:"Lily",     audio:"Sounds/Lily.ogg",     chickenFace:"Chickens_mit_Gesicht/Lily.png" },
    { name:"Marie",    audio:"Sounds/Marie.ogg",    chickenFace:"Chickens_mit_Gesicht/Marie.png" },
    { name:"Minh",     audio:"Sounds/Minh.ogg",     chickenFace:"Chickens_mit_Gesicht/Minh.png" },
    { name:"Quynh",    audio:"Sounds/Quynh.ogg",    chickenFace:"Chickens_mit_Gesicht/Quynh.png" },
    { name:"Séverine", audio:"Sounds/Severine.ogg", chickenFace:"Chickens_mit_Gesicht/Severine.png" },
    { name:"Thuy",     audio:"Sounds/Thuy.ogg",     chickenFace:"Chickens_mit_Gesicht/Thuy.png" }
  ];

  const people = positions.map((pos, i) => {
    const guest = guests[i];
    return {
      id: i + 1,
      name: guest.name,
      audio: guest.audio,
      initialImg: chickens[i % chickens.length], // Huhn, das anfangs zu sehen ist
      revealImg: guest.chickenFace,               // Gesicht-im-Hühnerkostüm-Bild, das beim Klick erscheint
      pos
    };
  });

  const stage = document.getElementById("islandStage");
  const overlay = document.getElementById("modalOverlay");
  const modalImage = document.getElementById("modalImage");
  const modalName = document.getElementById("modalName");
  const modalAudio = document.getElementById("modalAudio");
  const playBtn = document.getElementById("playBtn");
  const noAudioNote = document.getElementById("noAudioNote");
  const clickSound = new Audio("Sounds/click.wav");

  people.forEach(person => {
    const pin = document.createElement("button");
    pin.className = "pin pixel";
    pin.style.left = person.pos[0] + "%";
    pin.style.top = person.pos[1] + "%";
    pin.dataset.id = person.id;
    pin.innerHTML = `<img src="${person.initialImg}" alt="Geheimnisvolles Huhn">`;

    pin.addEventListener("click", () => reveal(person, pin));
    stage.appendChild(pin);
  });

  // Doggo: Bonus-Gast, der von Anfang an er selbst ist (kein Huhn, kein Reveal) –
  // ein Klick lässt nur seinen Sound abspielen.
  const doggo = { name:"Hajo", audio:"Sounds/Hajo.ogg", img:"Doggo/Hajo.png", pos:[6,14] };
  const doggoAudio = new Audio(doggo.audio);

  const doggoPin = document.createElement("button");
  doggoPin.className = "pin doggo";
  doggoPin.style.left = doggo.pos[0] + "%";
  doggoPin.style.top = doggo.pos[1] + "%";
  doggoPin.innerHTML = `<img src="${doggo.img}" alt="${doggo.name}"><span class="name-tag">${doggo.name}</span>`;
  doggoPin.addEventListener("click", () => {
    const startAt = () => {
      doggoAudio.currentTime = 4; // Sound erst ab Sekunde 4 abspielen
      doggoAudio.play().catch(()=>{ /* Autoplay evtl. blockiert */ });
    };
    if(doggoAudio.readyState >= 1){
      startAt();
    }else{
      doggoAudio.addEventListener("loadedmetadata", startAt, { once:true });
    }
    doggoPin.classList.remove("wag");
    void doggoPin.offsetWidth;
    doggoPin.classList.add("wag");
  });
  stage.appendChild(doggoPin);

  function reveal(person, pin){
    clickSound.currentTime = 0;
    clickSound.play().catch(()=>{ /* Autoplay evtl. blockiert */ });

    const alreadyRevealed = pin.classList.contains("revealed");

    if(!alreadyRevealed){
      pin.classList.add("revealed");

      const img = pin.querySelector("img");
      img.classList.remove("spin");
      void img.offsetWidth; // Reflow erzwingen, damit die Animation sicher startet
      img.classList.add("spin");

      // Bild genau in dem Moment austauschen, in dem das Huhn sich (bei 90°) von der Seite
      // zeigt und dadurch am schmalsten/unauffälligsten ist – das ergibt einen sauberen Dreh-Effekt.
      window.setTimeout(() => {
        pin.classList.remove("pixel");
        img.src = person.revealImg;
        img.alt = person.name;
      }, 180);

      window.setTimeout(() => img.classList.remove("spin"), 700);

      pin.querySelector(".name-tag")?.remove();
      const tag = document.createElement("span");
      tag.className = "name-tag";
      tag.textContent = person.name;
      pin.appendChild(tag);
    }

    // Erneutes Klicken auf ein bereits enthülltes Huhn öffnet einfach wieder das Pop-up
    // (ohne nochmal zu drehen) und spielt die Audio erneut ab.
    modalImage.src = person.revealImg;
    modalImage.alt = person.name;
    modalName.textContent = person.name;

    if(person.audio){
      modalAudio.src = person.audio;
      playBtn.hidden = false;
      noAudioNote.hidden = true;
      modalAudio.currentTime = 0;
      modalAudio.play().catch(()=>{ /* Autoplay evtl. blockiert, Button erlaubt manuelles Abspielen */ });
    }else{
      modalAudio.removeAttribute("src");
      playBtn.hidden = true;
      noAudioNote.hidden = false;
    }

    overlay.classList.add("open");
  }

  playBtn.addEventListener("click", () => {
    modalAudio.currentTime = 0;
    modalAudio.play().catch(()=>{});
  });

  document.getElementById("modalClose").addEventListener("click", () => {
    overlay.classList.remove("open");
    modalAudio.pause();
  });
  overlay.addEventListener("click", (e) => {
    if(e.target === overlay){
      overlay.classList.remove("open");
      modalAudio.pause();
    }
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    location.reload();
  });

  // Hintergrundmusik: läuft in Dauerschleife bei 12 % Lautstärke (0.12 von 1.0 –
  // ursprünglich 30 %, um 60 % reduziert). Browser blockieren automatisches Abspielen
  // mit Ton oft, bis die Nutzerin/der Nutzer einmal mit der Seite interagiert hat –
  // deshalb zusätzlich ein einmaliger Fallback auf den ersten Klick/Tastendruck.
  const bgMusic = document.getElementById("bgMusic");
  const BG_VOLUME_NORMAL = 0.12;
  const BG_VOLUME_DUCKED = 0.05; // während ein Gesicht-Sound läuft
  bgMusic.volume = BG_VOLUME_NORMAL;

  bgMusic.play().catch(() => {
    const startOnInteraction = () => {
      bgMusic.play().catch(()=>{});
      document.removeEventListener("click", startOnInteraction);
      document.removeEventListener("keydown", startOnInteraction);
    };
    document.addEventListener("click", startOnInteraction, { once:true });
    document.addEventListener("keydown", startOnInteraction, { once:true });
  });

  // Hintergrundmusik leiser drehen ("ducken"), solange der Sound einer Person läuft,
  // und danach wieder auf normale Lautstärke zurückstellen.
  modalAudio.addEventListener("play", () => { bgMusic.volume = BG_VOLUME_DUCKED; });
  modalAudio.addEventListener("pause", () => { bgMusic.volume = BG_VOLUME_NORMAL; });
  modalAudio.addEventListener("ended", () => { bgMusic.volume = BG_VOLUME_NORMAL; });
</script>
</body>
</html>
